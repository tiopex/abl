name: Release ROCKNIX ABL

on:
  push:
    tags:
      - "v*"

jobs:
  Build-release-ABL:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout LinuxLoader
        uses: actions/checkout@v6
        with:
          repository: ROCKNIX/LinuxLoader
          ssh-key: ${{ secrets.LINUXLOADER_DEPLOY_KEY }}
          submodules: recursive
          path: LinuxLoader

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential crossbuild-essential-arm64 libc6-dev uuid-dev llvm clang lld

      - name: Build
        run: |
          cd LinuxLoader
          ./make_abl.sh all

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            LinuxLoader/Output/abl_signed-SM6115.elf
            LinuxLoader/Output/abl_signed-SM8250.elf
            LinuxLoader/Output/abl_signed-SM8550.elf
            LinuxLoader/Output/abl_signed-SM8650.elf
            LinuxLoader/Output/abl_signed-SM6115.elf.sha256
            LinuxLoader/Output/abl_signed-SM8250.elf.sha256
            LinuxLoader/Output/abl_signed-SM8550.elf.sha256
            OLinuxLoader/utput/abl_signed-SM8650.elf.sha256